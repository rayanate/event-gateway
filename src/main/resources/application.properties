spring.application.name=eventGateway

# Server
server.port=8080

# H2 datasource (in-memory)
spring.datasource.url=jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Account Service URL (used by POST /events)
account.service.url=http://localhost:8082

# Resilience4j configuration for accountService
resilience4j.circuitbreaker.instances.accountService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.accountService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.accountService.failureRateThreshold=50
resilience4j.timelimiter.instances.accountService.timeoutDuration=10s

# Expose actuator health at /health
management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.prometheus.enabled=true

